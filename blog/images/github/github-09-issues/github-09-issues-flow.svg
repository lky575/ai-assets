<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560"><rect width="1200" height="560" fill="#0f172a" /><text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">GitHub Issue 흐름 요약</text><text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">해야 할 일, 문제, 아이디어를 Issue로 남기면 말로만 하지 않고 작업을 기록으로 관리할 수 있다</text><rect x="70" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" /><text x="195" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">할 일 발견</text><text x="195" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">버그, 개선, 아이디어</text><text x="195" y="282" text-anchor="middle" font-size="16" fill="#86efac">작업 필요</text><rect x="355" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" /><text x="480" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">Issue 등록</text><text x="480" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">제목과 내용 작성</text><text x="480" y="282" text-anchor="middle" font-size="16" fill="#93c5fd">기록 남김</text><rect x="640" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" /><text x="765" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">작업 진행</text><text x="765" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">누가 무엇을 할지</text><text x="765" y="282" text-anchor="middle" font-size="16" fill="#fcd34d">흐름 정리</text><rect x="925" y="160" width="205" height="220" rx="22" fill="#111827" stroke="#a78bfa" stroke-width="2" /><text x="1027" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">닫기</text><text x="1027" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">해결 완료</text><text x="1027" y="282" text-anchor="middle" font-size="16" fill="#c4b5fd">기록 보존</text><line x1="320" y1="270" x2="337" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="320" cy="270" r="7" fill="#60a5fa" /><polygon points="355,270 337,261 337,279" fill="#60a5fa" /><line x1="605" y1="270" x2="622" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="605" cy="270" r="7" fill="#60a5fa" /><polygon points="640,270 622,261 622,279" fill="#60a5fa" /><line x1="890" y1="270" x2="907" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="890" cy="270" r="7" fill="#60a5fa" /><polygon points="925,270 907,261 907,279" fill="#60a5fa" /><rect x="125" y="450" width="950" height="78" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" /><text x="600" y="483" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: Issue는 문제를 해결하는 기능이라기보다</text><text x="600" y="510" text-anchor="middle" font-size="18" fill="#e5e7eb">해야 할 일을 눈에 보이는 기록으로 바꿔 작업 흐름을 정리하게 해주는 도구다</text></svg>