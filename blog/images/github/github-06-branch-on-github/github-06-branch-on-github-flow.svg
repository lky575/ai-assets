<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560"><rect width="1200" height="560" fill="#0f172a" /><text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">GitHub에서 branch 반영 흐름 요약</text><text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">main에서 바로 오래 작업하기보다 브랜치를 나눠 작업하면 변경 내용을 더 안전하게 정리할 수 있다</text><rect x="70" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" /><text x="195" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">main 확인</text><text x="195" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">기준 브랜치</text><text x="195" y="282" text-anchor="middle" font-size="16" fill="#86efac">안정 상태</text><rect x="355" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" /><text x="480" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">브랜치 생성</text><text x="480" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">작업 공간 분리</text><text x="480" y="282" text-anchor="middle" font-size="16" fill="#93c5fd">새 기능 작업</text><rect x="640" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" /><text x="765" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">push</text><text x="765" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">브랜치 업로드</text><text x="765" y="282" text-anchor="middle" font-size="16" fill="#fcd34d">GitHub 반영</text><rect x="925" y="160" width="205" height="220" rx="22" fill="#111827" stroke="#a78bfa" stroke-width="2" /><text x="1027" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">PR 준비</text><text x="1027" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">검토 단계 시작</text><text x="1027" y="282" text-anchor="middle" font-size="16" fill="#c4b5fd">병합 전 확인</text><line x1="320" y1="270" x2="337" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="320" cy="270" r="7" fill="#60a5fa" /><polygon points="355,270 337,261 337,279" fill="#60a5fa" /><line x1="605" y1="270" x2="622" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="605" cy="270" r="7" fill="#60a5fa" /><polygon points="640,270 622,261 622,279" fill="#60a5fa" /><line x1="890" y1="270" x2="907" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="890" cy="270" r="7" fill="#60a5fa" /><polygon points="925,270 907,261 907,279" fill="#60a5fa" /><rect x="120" y="450" width="960" height="78" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" /><text x="600" y="483" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: GitHub에서도 브랜치는 작업을 분리하고</text><text x="600" y="510" text-anchor="middle" font-size="18" fill="#e5e7eb">나중에 Pull Request로 안전하게 반영하기 위한 기본 흐름이다</text></svg>