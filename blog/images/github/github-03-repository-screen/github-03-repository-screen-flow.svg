<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560"><rect width="1200" height="560" fill="#0f172a" /><text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">GitHub 저장소 화면 읽기 요약</text><text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">처음에는 모든 메뉴를 다 볼 필요 없이 Code, Issues, Pull Requests 중심으로 읽어도 충분하다</text><rect x="70" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" /><text x="195" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">Code</text><text x="195" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">파일과 브랜치</text><text x="195" y="282" text-anchor="middle" font-size="16" fill="#86efac">가장 먼저 보는 곳</text><rect x="355" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" /><text x="480" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">Issues</text><text x="480" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">할 일과 문제 정리</text><text x="480" y="282" text-anchor="middle" font-size="16" fill="#93c5fd">작업 기록</text><rect x="640" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" /><text x="765" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">Pull Requests</text><text x="765" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">변경 검토와 반영</text><text x="765" y="282" text-anchor="middle" font-size="16" fill="#fcd34d">협업 핵심</text><rect x="925" y="160" width="205" height="220" rx="22" fill="#111827" stroke="#a78bfa" stroke-width="2" /><text x="1027" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">Settings</text><text x="1027" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">설정 관리</text><text x="1027" y="282" text-anchor="middle" font-size="16" fill="#c4b5fd">나중에 익혀도 됨</text><line x1="320" y1="270" x2="337" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="320" cy="270" r="7" fill="#60a5fa" /><polygon points="355,270 337,261 337,279" fill="#60a5fa" /><line x1="605" y1="270" x2="622" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="605" cy="270" r="7" fill="#60a5fa" /><polygon points="640,270 622,261 622,279" fill="#60a5fa" /><line x1="890" y1="270" x2="907" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="890" cy="270" r="7" fill="#60a5fa" /><polygon points="925,270 907,261 907,279" fill="#60a5fa" /><rect x="120" y="450" width="960" height="78" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" /><text x="600" y="483" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: 저장소 화면은 처음부터 전부 익히기보다</text><text x="600" y="510" text-anchor="middle" font-size="18" fill="#e5e7eb">Code, Issues, Pull Requests 중심으로 읽기 시작하면 훨씬 덜 복잡하다</text></svg>