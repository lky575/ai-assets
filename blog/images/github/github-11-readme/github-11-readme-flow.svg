<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560"><rect width="1200" height="560" fill="#0f172a" /><text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">README가 하는 일 요약</text><text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">README는 저장소에 들어온 사람이 이 프로젝트가 무엇이고 어떻게 써야 하는지 가장 먼저 이해하게 돕는 문서다</text><rect x="70" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" /><text x="195" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">프로젝트 소개</text><text x="195" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">무엇을 위한 저장소인지</text><text x="195" y="282" text-anchor="middle" font-size="16" fill="#86efac">첫인상</text><rect x="355" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" /><text x="480" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">설치와 실행</text><text x="480" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">어떻게 시작하는지</text><text x="480" y="282" text-anchor="middle" font-size="16" fill="#93c5fd">따라하기 안내</text><rect x="640" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" /><text x="765" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">핵심 정보</text><text x="765" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">기능, 구조, 주의점</text><text x="765" y="282" text-anchor="middle" font-size="16" fill="#fcd34d">이해 보조</text><rect x="925" y="160" width="205" height="220" rx="22" fill="#111827" stroke="#a78bfa" stroke-width="2" /><text x="1027" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">협업 안내</text><text x="1027" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">기여 방식</text><text x="1027" y="282" text-anchor="middle" font-size="16" fill="#c4b5fd">연락 방법</text><line x1="320" y1="270" x2="337" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="320" cy="270" r="7" fill="#60a5fa" /><polygon points="355,270 337,261 337,279" fill="#60a5fa" /><line x1="605" y1="270" x2="622" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="605" cy="270" r="7" fill="#60a5fa" /><polygon points="640,270 622,261 622,279" fill="#60a5fa" /><line x1="890" y1="270" x2="907" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="890" cy="270" r="7" fill="#60a5fa" /><polygon points="925,270 907,261 907,279" fill="#60a5fa" /><rect x="125" y="450" width="950" height="78" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" /><text x="600" y="483" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: README는 꾸미기용 문서가 아니라</text><text x="600" y="510" text-anchor="middle" font-size="18" fill="#e5e7eb">저장소에 처음 들어온 사람이 길을 잃지 않게 도와주는 가장 기본적인 안내문이다</text></svg>