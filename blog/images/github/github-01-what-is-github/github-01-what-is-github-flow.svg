<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#0f172a" />
  <text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">GitHub 기본 흐름 요약</text>
  <text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">GitHub는 Git 저장소를 올려두고 공유, 백업, 협업까지 이어가게 해주는 대표적인 서비스다</text>

  <rect x="70" y="160" width="320" height="240" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" />
  <text x="230" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">내 컴퓨터의 Git</text>
  <text x="230" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">로컬 저장소</text>
  <text x="230" y="282" text-anchor="middle" font-size="16" fill="#86efac">기록하고 관리</text>
  <text x="230" y="314" text-anchor="middle" font-size="16" fill="#86efac">혼자서도 사용 가능</text>

  <rect x="440" y="160" width="320" height="240" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" />
  <text x="600" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">GitHub</text>
  <text x="600" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">원격 저장소 서비스</text>
  <text x="600" y="282" text-anchor="middle" font-size="16" fill="#93c5fd">올려두고 공유</text>
  <text x="600" y="314" text-anchor="middle" font-size="16" fill="#93c5fd">협업과 백업</text>

  <rect x="810" y="160" width="320" height="240" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" />
  <text x="970" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">협업 흐름</text>
  <text x="970" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">push, pull, clone</text>
  <text x="970" y="282" text-anchor="middle" font-size="16" fill="#fcd34d">여러 사람이 연결</text>
  <text x="970" y="314" text-anchor="middle" font-size="16" fill="#fcd34d">작업 이력 공유</text>

  <line x1="390" y1="280" x2="414" y2="280" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" />
  <circle cx="390" cy="280" r="7" fill="#60a5fa" />
  <polygon points="432,280 414,271 414,289" fill="#60a5fa" />

  <line x1="760" y1="280" x2="784" y2="280" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" />
  <circle cx="760" cy="280" r="7" fill="#60a5fa" />
  <polygon points="802,280 784,271 784,289" fill="#60a5fa" />

  <rect x="120" y="450" width="960" height="78" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="483" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: Git은 버전 관리 도구이고 GitHub는 그 Git 저장소를</text>
  <text x="600" y="510" text-anchor="middle" font-size="18" fill="#e5e7eb">올려두고 공유, 협업, 백업까지 이어가게 해주는 대표적인 서비스다</text>
</svg>
