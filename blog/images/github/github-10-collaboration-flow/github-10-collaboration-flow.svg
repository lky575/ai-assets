<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580"><rect width="1200" height="580" fill="#0f172a" /><text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">GitHub 협업 기본 흐름 정리</text><text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">Issue로 시작해 브랜치, 작업, push, PR, merge로 이어지는 흐름이 GitHub 협업의 가장 기본적인 골격이다</text><rect x="60" y="170" width="170" height="210" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" /><text x="145" y="214" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">Issue</text><text x="145" y="250" text-anchor="middle" font-size="15" fill="#cbd5e1">할 일 정리</text><rect x="250" y="170" width="170" height="210" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" /><text x="335" y="214" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">branch</text><text x="335" y="250" text-anchor="middle" font-size="15" fill="#cbd5e1">작업 분리</text><rect x="440" y="170" width="170" height="210" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" /><text x="525" y="214" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">작업</text><text x="525" y="250" text-anchor="middle" font-size="15" fill="#cbd5e1">수정과 commit</text><rect x="630" y="170" width="170" height="210" rx="22" fill="#111827" stroke="#ef4444" stroke-width="2" /><text x="715" y="214" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">push</text><text x="715" y="250" text-anchor="middle" font-size="15" fill="#cbd5e1">GitHub 반영</text><rect x="820" y="170" width="170" height="210" rx="22" fill="#111827" stroke="#a78bfa" stroke-width="2" /><text x="905" y="214" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">PR</text><text x="905" y="250" text-anchor="middle" font-size="15" fill="#cbd5e1">검토 요청</text><rect x="1010" y="170" width="130" height="210" rx="22" fill="#111827" stroke="#22c55e" stroke-width="2" /><text x="1075" y="214" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">merge</text><text x="1075" y="250" text-anchor="middle" font-size="15" fill="#cbd5e1">반영 완료</text><line x1="230" y1="270" x2="232" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="230" cy="270" r="7" fill="#60a5fa" /><polygon points="250,270 232,261 232,279" fill="#60a5fa" /><line x1="420" y1="270" x2="422" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="420" cy="270" r="7" fill="#60a5fa" /><polygon points="440,270 422,261 422,279" fill="#60a5fa" /><line x1="610" y1="270" x2="612" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="610" cy="270" r="7" fill="#60a5fa" /><polygon points="630,270 612,261 612,279" fill="#60a5fa" /><line x1="800" y1="270" x2="802" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="800" cy="270" r="7" fill="#60a5fa" /><polygon points="820,270 802,261 802,279" fill="#60a5fa" /><line x1="990" y1="270" x2="992" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="990" cy="270" r="7" fill="#60a5fa" /><polygon points="1010,270 992,261 992,279" fill="#60a5fa" /><rect x="95" y="465" width="1010" height="82" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" /><text x="600" y="499" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: GitHub 협업은 거창한 절차가 아니라</text><text x="600" y="527" text-anchor="middle" font-size="18" fill="#e5e7eb">해야 할 일을 기록하고 분리해서 작업한 뒤 검토를 거쳐 반영하는 흐름의 반복이다</text></svg>