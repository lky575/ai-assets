<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580"><rect width="1200" height="580" fill="#0f172a" /><text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">GitHub 흐름 마무리 정리</text><text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">저장소를 만들고, 올리고, 브랜치를 나누고, PR과 Issue를 이해하면 GitHub 기본 흐름이 하나로 이어진다</text><rect x="60" y="170" width="170" height="210" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" /><text x="145" y="214" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">저장소</text><text x="145" y="250" text-anchor="middle" font-size="15" fill="#cbd5e1">기본 공간</text><rect x="250" y="170" width="170" height="210" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" /><text x="335" y="214" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">push/pull</text><text x="335" y="250" text-anchor="middle" font-size="15" fill="#cbd5e1">연결 흐름</text><rect x="440" y="170" width="170" height="210" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" /><text x="525" y="214" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">branch</text><text x="525" y="250" text-anchor="middle" font-size="15" fill="#cbd5e1">작업 분리</text><rect x="630" y="170" width="170" height="210" rx="22" fill="#111827" stroke="#ef4444" stroke-width="2" /><text x="715" y="214" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">PR</text><text x="715" y="250" text-anchor="middle" font-size="15" fill="#cbd5e1">검토와 반영</text><rect x="820" y="170" width="170" height="210" rx="22" fill="#111827" stroke="#a78bfa" stroke-width="2" /><text x="905" y="214" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">Issue</text><text x="905" y="250" text-anchor="middle" font-size="15" fill="#cbd5e1">작업 기록</text><rect x="1010" y="170" width="130" height="210" rx="22" fill="#111827" stroke="#22c55e" stroke-width="2" /><text x="1075" y="214" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">습관</text><text x="1075" y="250" text-anchor="middle" font-size="15" fill="#cbd5e1">읽기 좋은 흐름</text><line x1="230" y1="270" x2="232" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="230" cy="270" r="7" fill="#60a5fa" /><polygon points="250,270 232,261 232,279" fill="#60a5fa" /><line x1="420" y1="270" x2="422" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="420" cy="270" r="7" fill="#60a5fa" /><polygon points="440,270 422,261 422,279" fill="#60a5fa" /><line x1="610" y1="270" x2="612" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="610" cy="270" r="7" fill="#60a5fa" /><polygon points="630,270 612,261 612,279" fill="#60a5fa" /><line x1="800" y1="270" x2="802" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="800" cy="270" r="7" fill="#60a5fa" /><polygon points="820,270 802,261 802,279" fill="#60a5fa" /><line x1="990" y1="270" x2="992" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="990" cy="270" r="7" fill="#60a5fa" /><polygon points="1010,270 992,261 992,279" fill="#60a5fa" /><rect x="95" y="465" width="1010" height="82" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" /><text x="600" y="499" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: GitHub는 기능을 따로따로 외우는 공간이 아니라</text><text x="600" y="527" text-anchor="middle" font-size="18" fill="#e5e7eb">작업을 저장하고 공유하고 검토하고 정리하는 흐름을 이어서 익히는 공간이다</text></svg>