<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560"><rect width="1200" height="560" fill="#0f172a" /><text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">로컬 프로젝트를 GitHub에 처음 올리는 흐름</text><text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">로컬에서 기록한 프로젝트를 원격 저장소와 연결하고 push하면 GitHub에서도 같은 프로젝트를 볼 수 있다</text><rect x="70" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" /><text x="195" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">로컬 프로젝트</text><text x="195" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">Git 저장소 준비</text><text x="195" y="282" text-anchor="middle" font-size="16" fill="#86efac">내 컴퓨터 작업</text><rect x="355" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" /><text x="480" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">원격 연결</text><text x="480" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">GitHub 저장소 주소 등록</text><text x="480" y="282" text-anchor="middle" font-size="16" fill="#93c5fd">origin 연결</text><rect x="640" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" /><text x="765" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">git push</text><text x="765" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">로컬 기록 업로드</text><text x="765" y="282" text-anchor="middle" font-size="16" fill="#fcd34d">GitHub 반영</text><rect x="925" y="160" width="205" height="220" rx="22" fill="#111827" stroke="#a78bfa" stroke-width="2" /><text x="1027" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">결과 확인</text><text x="1027" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">파일과 기록 표시</text><text x="1027" y="282" text-anchor="middle" font-size="16" fill="#c4b5fd">업로드 완료</text><line x1="320" y1="270" x2="337" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="320" cy="270" r="7" fill="#60a5fa" /><polygon points="355,270 337,261 337,279" fill="#60a5fa" /><line x1="605" y1="270" x2="622" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="605" cy="270" r="7" fill="#60a5fa" /><polygon points="640,270 622,261 622,279" fill="#60a5fa" /><line x1="890" y1="270" x2="907" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="890" cy="270" r="7" fill="#60a5fa" /><polygon points="925,270 907,261 907,279" fill="#60a5fa" /><rect x="105" y="450" width="990" height="78" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" /><text x="600" y="483" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: 첫 업로드는 내 컴퓨터의 Git 프로젝트를</text><text x="600" y="510" text-anchor="middle" font-size="18" fill="#e5e7eb">GitHub 저장소와 연결한 뒤 push로 밖에 보이게 만드는 과정이다</text></svg>