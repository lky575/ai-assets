<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560"><rect width="1200" height="560" fill="#0f172a" /><text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">Pull Request 보내고 merge하는 흐름</text><text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">PR을 만든 뒤 비교 화면을 확인하고 문제가 없으면 merge로 기준 브랜치에 반영한다</text><rect x="70" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" /><text x="195" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">PR 생성</text><text x="195" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">변경 요청 등록</text><text x="195" y="282" text-anchor="middle" font-size="16" fill="#86efac">비교 시작</text><rect x="355" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" /><text x="480" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">변경 검토</text><text x="480" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">파일, 커밋 확인</text><text x="480" y="282" text-anchor="middle" font-size="16" fill="#93c5fd">리뷰 가능</text><rect x="640" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" /><text x="765" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">merge</text><text x="765" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">반영 승인</text><text x="765" y="282" text-anchor="middle" font-size="16" fill="#fcd34d">기준 브랜치로 이동</text><rect x="925" y="160" width="205" height="220" rx="22" fill="#111827" stroke="#a78bfa" stroke-width="2" /><text x="1027" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">완료 상태</text><text x="1027" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">PR 닫힘</text><text x="1027" y="282" text-anchor="middle" font-size="16" fill="#c4b5fd">반영 완료</text><line x1="320" y1="270" x2="337" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="320" cy="270" r="7" fill="#60a5fa" /><polygon points="355,270 337,261 337,279" fill="#60a5fa" /><line x1="605" y1="270" x2="622" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="605" cy="270" r="7" fill="#60a5fa" /><polygon points="640,270 622,261 622,279" fill="#60a5fa" /><line x1="890" y1="270" x2="907" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="890" cy="270" r="7" fill="#60a5fa" /><polygon points="925,270 907,261 907,279" fill="#60a5fa" /><rect x="115" y="450" width="970" height="78" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" /><text x="600" y="483" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: PR은 만드는 것으로 끝나지 않고</text><text x="600" y="510" text-anchor="middle" font-size="18" fill="#e5e7eb">비교, 검토, merge까지 이어져야 GitHub 협업 흐름이 완성된다</text></svg>