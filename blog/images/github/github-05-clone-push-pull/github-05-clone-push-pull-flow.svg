<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560"><rect width="1200" height="560" fill="#0f172a" /><text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">GitHub 기준 clone, push, pull 요약</text><text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">GitHub를 기준으로 보면 clone은 가져오기, push는 올리기, pull은 최신 내용 받아오기다</text><rect x="70" y="160" width="320" height="240" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" /><text x="230" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">clone</text><text x="230" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">GitHub → 내 컴퓨터</text><text x="230" y="282" text-anchor="middle" font-size="16" fill="#86efac">저장소 가져오기</text><rect x="440" y="160" width="320" height="240" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" /><text x="600" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">push</text><text x="600" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">내 컴퓨터 → GitHub</text><text x="600" y="282" text-anchor="middle" font-size="16" fill="#93c5fd">기록 올리기</text><rect x="810" y="160" width="320" height="240" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" /><text x="970" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">pull</text><text x="970" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">GitHub → 내 컴퓨터</text><text x="970" y="282" text-anchor="middle" font-size="16" fill="#fcd34d">최신 내용 반영</text><line x1="390" y1="280" x2="414" y2="280" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="390" cy="280" r="7" fill="#60a5fa" /><polygon points="432,280 414,271 414,289" fill="#60a5fa" /><line x1="760" y1="280" x2="784" y2="280" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="760" cy="280" r="7" fill="#60a5fa" /><polygon points="802,280 784,271 784,289" fill="#60a5fa" /><rect x="120" y="450" width="960" height="78" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" /><text x="600" y="483" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: GitHub 기준으로 보면 push와 pull은 방향이 반대이고</text><text x="600" y="510" text-anchor="middle" font-size="18" fill="#e5e7eb">clone은 처음 작업을 시작할 때 저장소 전체를 가져오는 출발점이다</text></svg>