<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#0f172a" />
  <text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">GitHub 첫 저장소 만들기 흐름 요약</text>
  <text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">가입이 끝나면 저장소 이름을 정하고 공개 범위를 선택해 첫 GitHub 공간을 만들 수 있다</text>

  <rect x="70" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" />
  <text x="195" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">GitHub 가입</text>
  <text x="195" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">계정 준비</text>
  <text x="195" y="282" text-anchor="middle" font-size="16" fill="#86efac">시작 지점</text>

  <rect x="355" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" />
  <text x="480" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">저장소 정보 입력</text>
  <text x="480" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">이름, 설명</text>
  <text x="480" y="282" text-anchor="middle" font-size="16" fill="#93c5fd">기본 설정</text>

  <rect x="640" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" />
  <text x="765" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">공개 범위 선택</text>
  <text x="765" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">public 또는 private</text>
  <text x="765" y="282" text-anchor="middle" font-size="16" fill="#fcd34d">용도에 맞게 결정</text>

  <rect x="925" y="160" width="205" height="220" rx="22" fill="#111827" stroke="#a78bfa" stroke-width="2" />
  <text x="1027" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">생성 완료</text>
  <text x="1027" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">첫 저장소 확보</text>
  <text x="1027" y="282" text-anchor="middle" font-size="16" fill="#c4b5fd">이제 올릴 준비</text>

  <line x1="320" y1="270" x2="337" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="320" cy="270" r="7" fill="#60a5fa" /><polygon points="355,270 337,261 337,279" fill="#60a5fa" />
  <line x1="605" y1="270" x2="622" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="605" cy="270" r="7" fill="#60a5fa" /><polygon points="640,270 622,261 622,279" fill="#60a5fa" />
  <line x1="890" y1="270" x2="907" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="890" cy="270" r="7" fill="#60a5fa" /><polygon points="925,270 907,261 907,279" fill="#60a5fa" />

  <rect x="115" y="450" width="970" height="78" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="483" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: 첫 저장소 만들기는 어려운 설정 싸움이 아니라</text>
  <text x="600" y="510" text-anchor="middle" font-size="18" fill="#e5e7eb">저장소 이름과 공개 범위를 정해 GitHub 위에 내 작업 공간 하나를 만드는 과정이다</text>
</svg>
