<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560"><rect width="1200" height="560" fill="#0f172a" /><text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">public과 private 저장소 구분 요약</text><text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">보여줘도 괜찮은 프로젝트는 public, 아직 닫아두고 싶은 작업은 private으로 두는 감각이면 시작하기 쉽다</text><rect x="110" y="160" width="430" height="240" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" /><text x="325" y="204" text-anchor="middle" font-size="26" font-weight="700" fill="#f8fafc">public</text><text x="325" y="244" text-anchor="middle" font-size="16" fill="#cbd5e1">외부에 공개 가능</text><text x="325" y="284" text-anchor="middle" font-size="16" fill="#86efac">공부 기록, 포트폴리오</text><text x="325" y="316" text-anchor="middle" font-size="16" fill="#86efac">공유 목적 프로젝트</text><rect x="660" y="160" width="430" height="240" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" /><text x="875" y="204" text-anchor="middle" font-size="26" font-weight="700" fill="#f8fafc">private</text><text x="875" y="244" text-anchor="middle" font-size="16" fill="#cbd5e1">보는 사람 제한</text><text x="875" y="284" text-anchor="middle" font-size="16" fill="#93c5fd">개인 실험, 민감 정보 주의</text><text x="875" y="316" text-anchor="middle" font-size="16" fill="#93c5fd">정리 전 작업물</text><line x1="540" y1="280" x2="624" y2="280" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="540" cy="280" r="7" fill="#60a5fa" /><polygon points="642,280 624,271 624,289" fill="#60a5fa" /><rect x="130" y="450" width="940" height="78" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" /><text x="600" y="483" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: public과 private의 선택은 어려운 보안 전략보다</text><text x="600" y="510" text-anchor="middle" font-size="18" fill="#e5e7eb">지금 이 저장소를 외부에 보여줘도 괜찮은지부터 생각하면 훨씬 단순해진다</text></svg>