<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560"><rect width="1200" height="560" fill="#0f172a" /><text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">GitHub 사용할 때 좋은 습관 요약</text><text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">작은 습관이 쌓이면 저장소가 더 읽기 쉬워지고 협업도 덜 복잡해진다</text><rect x="70" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" /><text x="195" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">작게 나누기</text><text x="195" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">작은 branch와 PR</text><text x="195" y="282" text-anchor="middle" font-size="16" fill="#86efac">읽기 쉬움</text><rect x="355" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" /><text x="480" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">분명하게 쓰기</text><text x="480" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">제목, commit, Issue</text><text x="480" y="282" text-anchor="middle" font-size="16" fill="#93c5fd">무슨 작업인지 보이게</text><rect x="640" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" /><text x="765" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">push 전 확인</text><text x="765" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">브랜치와 내용 점검</text><text x="765" y="282" text-anchor="middle" font-size="16" fill="#fcd34d">실수 감소</text><rect x="925" y="160" width="205" height="220" rx="22" fill="#111827" stroke="#a78bfa" stroke-width="2" /><text x="1027" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">기록 남기기</text><text x="1027" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">README와 Issue</text><text x="1027" y="282" text-anchor="middle" font-size="16" fill="#c4b5fd">흐름 유지</text><line x1="320" y1="270" x2="337" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="320" cy="270" r="7" fill="#60a5fa" /><polygon points="355,270 337,261 337,279" fill="#60a5fa" /><line x1="605" y1="270" x2="622" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="605" cy="270" r="7" fill="#60a5fa" /><polygon points="640,270 622,261 622,279" fill="#60a5fa" /><line x1="890" y1="270" x2="907" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="890" cy="270" r="7" fill="#60a5fa" /><polygon points="925,270 907,261 907,279" fill="#60a5fa" /><rect x="125" y="450" width="950" height="78" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" /><text x="600" y="483" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: GitHub를 잘 쓰는 사람은 특별한 기능을 많이 아는 사람보다</text><text x="600" y="510" text-anchor="middle" font-size="18" fill="#e5e7eb">작은 확인과 정리를 꾸준히 반복하는 사람인 경우가 많다</text></svg>