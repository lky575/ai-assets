<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#0f172a" />
  <text x="600" y="52" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">Git과 GitHub의 차이</text>
  <text x="600" y="84" text-anchor="middle" font-size="16" fill="#94a3b8">Git은 버전 관리 도구이고, GitHub는 그 저장소를 올려 협업하는 서비스다</text>

  <rect x="90" y="130" width="420" height="300" rx="24" fill="#111827" stroke="#38bdf8" stroke-width="2" />
  <rect x="690" y="130" width="420" height="300" rx="24" fill="#111827" stroke="#34d399" stroke-width="2" />

  <text x="300" y="182" text-anchor="middle" font-size="28" font-weight="700" fill="#f8fafc">Git</text>
  <text x="900" y="182" text-anchor="middle" font-size="28" font-weight="700" fill="#f8fafc">GitHub</text>

  <text x="130" y="240" font-size="20" fill="#e5e7eb">• 버전 관리 도구</text>
  <text x="130" y="282" font-size="20" fill="#e5e7eb">• 내 컴퓨터에서 직접 사용 가능</text>
  <text x="130" y="324" font-size="20" fill="#e5e7eb">• 변경 이력, 복구, 브랜치 관리</text>
  <text x="130" y="366" font-size="20" fill="#e5e7eb">• 프로젝트 변화 과정을 기록</text>

  <text x="730" y="240" font-size="20" fill="#e5e7eb">• Git 저장소를 올리는 서비스</text>
  <text x="730" y="282" font-size="20" fill="#e5e7eb">• 협업, 공유, 백업에 유리</text>
  <text x="730" y="324" font-size="20" fill="#e5e7eb">• Pull Request, Issue, Actions 제공</text>
  <text x="730" y="366" font-size="20" fill="#e5e7eb">• 팀 작업을 온라인에서 연결</text>

  <line x1="530" y1="280" x2="670" y2="280" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" />
  <polygon points="658,268 688,280 658,292" fill="#60a5fa" />
  <text x="600" y="244" text-anchor="middle" font-size="16" font-weight="700" fill="#bfdbfe">Git 저장소를 GitHub에 올려</text>
  <text x="600" y="266" text-anchor="middle" font-size="16" font-weight="700" fill="#bfdbfe">공유와 협업에 활용</text>

  <rect x="230" y="470" width="740" height="58" rx="14" fill="#111827" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="506" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: Git은 기술 자체, GitHub는 그 Git 저장소를 다루는 온라인 서비스다</text>
</svg>
