<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <rect width="1200" height="520" fill="#0f172a" />
  <text x="600" y="52" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">Git은 변경 과정을 기록한다</text>
  <text x="600" y="84" text-anchor="middle" font-size="16" fill="#94a3b8">현재 결과만 보는 것이 아니라, 프로젝트가 어떻게 바뀌었는지 흐름까지 남긴다</text>

  <rect x="100" y="130" width="1000" height="250" rx="24" fill="#111827" stroke="#334155" stroke-width="2" />

  <rect x="140" y="180" width="180" height="120" rx="18" fill="#1e293b" stroke="#22c55e" stroke-width="2" />
  <text x="230" y="220" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">v1</text>
  <text x="230" y="250" text-anchor="middle" font-size="16" fill="#cbd5e1">초기 작성</text>
  <text x="230" y="276" text-anchor="middle" font-size="15" fill="#94a3b8">프로젝트 시작점</text>

  <rect x="380" y="180" width="180" height="120" rx="18" fill="#1e293b" stroke="#38bdf8" stroke-width="2" />
  <text x="470" y="220" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">v2</text>
  <text x="470" y="250" text-anchor="middle" font-size="16" fill="#cbd5e1">기능 추가</text>
  <text x="470" y="276" text-anchor="middle" font-size="15" fill="#94a3b8">새 코드 반영</text>

  <rect x="620" y="180" width="180" height="120" rx="18" fill="#1e293b" stroke="#f59e0b" stroke-width="2" />
  <text x="710" y="220" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">v3</text>
  <text x="710" y="250" text-anchor="middle" font-size="16" fill="#cbd5e1">문제 수정</text>
  <text x="710" y="276" text-anchor="middle" font-size="15" fill="#94a3b8">오류 원인 해결</text>

  <rect x="860" y="180" width="180" height="120" rx="18" fill="#1e293b" stroke="#a78bfa" stroke-width="2" />
  <text x="950" y="220" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">v4</text>
  <text x="950" y="250" text-anchor="middle" font-size="16" fill="#cbd5e1">안정화</text>
  <text x="950" y="276" text-anchor="middle" font-size="15" fill="#94a3b8">배포 가능한 상태</text>

  <line x1="330" y1="240" x2="365" y2="240" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" />
  <path d="M365 232 L382 240 L365 248 Z" fill="#60a5fa" />
  <circle cx="330" cy="240" r="5" fill="#60a5fa" />

  <line x1="570" y1="240" x2="605" y2="240" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" />
  <path d="M605 232 L622 240 L605 248 Z" fill="#60a5fa" />
  <circle cx="570" cy="240" r="5" fill="#60a5fa" />

  <line x1="810" y1="240" x2="845" y2="240" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" />
  <path d="M845 232 L862 240 L845 248 Z" fill="#60a5fa" />
  <circle cx="810" cy="240" r="5" fill="#60a5fa" />

  <text x="950" y="158" text-anchor="middle" font-size="15" font-weight="700" fill="#fca5a5">문제가 생기면</text>
  <text x="950" y="178" text-anchor="middle" font-size="15" font-weight="700" fill="#fca5a5">이전 기록을 확인 가능</text>

  <rect x="240" y="420" width="720" height="58" rx="14" fill="#111827" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="456" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: Git은 각 시점의 변경을 기록해 흐름을 추적하고 되돌리기 쉽게 만든다</text>
</svg>
