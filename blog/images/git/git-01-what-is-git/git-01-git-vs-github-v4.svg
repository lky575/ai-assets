<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#0f172a" />
  <text x="600" y="52" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">Git과 GitHub는 다르다</text>
  <text x="600" y="84" text-anchor="middle" font-size="16" fill="#94a3b8">Git은 버전 관리 도구이고, GitHub는 그 Git 저장소를 올려 공유하고 협업하는 서비스다</text>

  <defs>
    <marker id="arrow-blue" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M1,3 L13,8 L1,13" fill="#60a5fa" stroke="#0f172a" stroke-width="1.2" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect x="90" y="130" width="400" height="300" rx="24" fill="#111827" stroke="#38bdf8" stroke-width="2" />
  <rect x="710" y="130" width="400" height="300" rx="24" fill="#111827" stroke="#34d399" stroke-width="2" />

  <text x="290" y="182" text-anchor="middle" font-size="28" font-weight="700" fill="#f8fafc">Git</text>
  <text x="910" y="182" text-anchor="middle" font-size="28" font-weight="700" fill="#f8fafc">GitHub</text>

  <text x="125" y="240" font-size="20" fill="#e5e7eb">• 버전 관리 도구</text>
  <text x="125" y="282" font-size="20" fill="#e5e7eb">• 내 컴퓨터에서 직접 사용 가능</text>
  <text x="125" y="324" font-size="20" fill="#e5e7eb">• 변경 이력, 복구, 브랜치 관리</text>
  <text x="125" y="366" font-size="20" fill="#e5e7eb">• 프로젝트 변화를 기록</text>

  <text x="745" y="240" font-size="20" fill="#e5e7eb">• Git 저장소를 올리는 서비스</text>
  <text x="745" y="282" font-size="20" fill="#e5e7eb">• 공유, 백업, 협업에 유리</text>
  <text x="745" y="324" font-size="20" fill="#e5e7eb">• Pull Request, Issue, Actions 제공</text>
  <text x="745" y="366" font-size="20" fill="#e5e7eb">• 팀 작업을 온라인으로 연결</text>

  <text x="600" y="222" text-anchor="middle" font-size="15" font-weight="700" fill="#bfdbfe">Git 저장소를 GitHub에 올려</text>
  <text x="600" y="244" text-anchor="middle" font-size="15" font-weight="700" fill="#bfdbfe">공유와 협업에 활용</text>
  <line x1="510" y1="282" x2="690" y2="282" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow-blue)" />
  <circle cx="510" cy="282" r="5" fill="#60a5fa" />

  <rect x="230" y="470" width="740" height="58" rx="14" fill="#111827" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="506" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: Git은 기술 자체이고, GitHub는 그 Git 저장소를 다루는 온라인 서비스다</text>
</svg>
