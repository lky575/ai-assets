<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#0f172a" />
  <text x="600" y="52" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">git push와 pull 기본 흐름</text>
  <text x="600" y="84" text-anchor="middle" font-size="16" fill="#94a3b8">push는 올리기, pull은 가져오기다</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#60a5fa" />
    </marker>
    <marker id="arrowBack" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto">
      <path d="M10,0 L0,5 L10,10 Z" fill="#34d399" />
    </marker>
  </defs>

  <rect x="180" y="150" width="260" height="120" rx="18" fill="#1e293b" stroke="#38bdf8" stroke-width="2" />
  <text x="310" y="188" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">로컬 저장소</text>
  <text x="310" y="220" text-anchor="middle" font-size="16" fill="#cbd5e1">내 PC에서 작업</text>
  <text x="310" y="246" text-anchor="middle" font-size="16" fill="#cbd5e1">commit 생성</text>

  <rect x="760" y="150" width="260" height="120" rx="18" fill="#1e293b" stroke="#34d399" stroke-width="2" />
  <text x="890" y="188" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">원격 저장소</text>
  <text x="890" y="220" text-anchor="middle" font-size="16" fill="#cbd5e1">GitHub 등</text>
  <text x="890" y="246" text-anchor="middle" font-size="16" fill="#cbd5e1">공유 / 백업</text>

  <line x1="440" y1="190" x2="760" y2="190" stroke="#60a5fa" stroke-width="5" marker-end="url(#arrow)" />
  <text x="600" y="176" text-anchor="middle" font-size="18" font-weight="700" fill="#bfdbfe">push</text>
  <text x="600" y="211" text-anchor="middle" font-size="15" fill="#cbd5e1">로컬 → 원격</text>

  <line x1="760" y1="235" x2="440" y2="235" stroke="#34d399" stroke-width="5" marker-end="url(#arrowBack)" />
  <text x="600" y="270" text-anchor="middle" font-size="18" font-weight="700" fill="#bbf7d0">pull</text>
  <text x="600" y="295" text-anchor="middle" font-size="15" fill="#cbd5e1">원격 → 로컬</text>

  <rect x="270" y="330" width="660" height="54" rx="14" fill="#111827" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="364" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: push는 보내기, pull은 가져오기</text>
</svg>
