<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#0f172a" />
  <text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">git restore 기본 흐름 요약</text>
  <text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">커밋 전 수정 내용이라면 git restore로 이전 상태로 되돌려 다시 정리할 수 있다</text>
  <rect x="70" y="160" width="320" height="240" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" />
  <text x="230" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">현재 작업 파일</text>
  <text x="230" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">실수로 수정됨</text>
  <text x="230" y="282" text-anchor="middle" font-size="16" fill="#fcd34d">아직 커밋 전</text>
  <text x="230" y="314" text-anchor="middle" font-size="16" fill="#fcd34d">되돌릴 수 있음</text>
  <rect x="440" y="160" width="320" height="240" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" />
  <text x="600" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">git restore</text>
  <text x="600" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">작업 트리 되돌리기</text>
  <text x="600" y="282" text-anchor="middle" font-size="16" fill="#93c5fd">불필요한 수정 제거</text>
  <text x="600" y="314" text-anchor="middle" font-size="16" fill="#93c5fd">다시 깔끔한 상태</text>
  <rect x="810" y="160" width="320" height="240" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" />
  <text x="970" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">이전 기준 상태</text>
  <text x="970" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">마지막 커밋 기준</text>
  <text x="970" y="282" text-anchor="middle" font-size="16" fill="#86efac">파일 내용 복구</text>
  <text x="970" y="314" text-anchor="middle" font-size="16" fill="#86efac">작업 정리 완료</text>
  <line x1="390" y1="280" x2="414" y2="280" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" />
  <circle cx="390" cy="280" r="7" fill="#60a5fa" />
  <polygon points="432,280 414,271 414,289" fill="#60a5fa" />
  <line x1="760" y1="280" x2="784" y2="280" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" />
  <circle cx="760" cy="280" r="7" fill="#60a5fa" />
  <polygon points="802,280 784,271 784,289" fill="#60a5fa" />
  <rect x="140" y="450" width="920" height="78" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="483" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: git restore는 아직 커밋하지 않은 수정 내용을</text>
  <text x="600" y="510" text-anchor="middle" font-size="18" fill="#e5e7eb">마지막 기준 상태로 되돌릴 때 쓰는 가장 기본적인 복구 명령어다</text>
</svg>
