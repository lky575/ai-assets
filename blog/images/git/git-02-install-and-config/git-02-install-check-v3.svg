<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <rect width="1200" height="520" fill="#0f172a" />
  <text x="600" y="52" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">3단계, 설치 확인과 첫 설정</text>
  <text x="600" y="84" text-anchor="middle" font-size="16" fill="#94a3b8">설치가 끝나면 바로 버전 확인과 사용자 정보 설정까지 해두면 다음 단계로 자연스럽게 넘어갈 수 있다</text>

  <rect x="120" y="140" width="440" height="220" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" />
  <text x="340" y="182" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">설치 확인</text>
  <rect x="170" y="220" width="340" height="70" rx="14" fill="#020617" stroke="#334155" stroke-width="1.5" />
  <text x="190" y="263" font-size="22" fill="#e5e7eb">git --version</text>
  <text x="340" y="324" text-anchor="middle" font-size="15" fill="#93c5fd">버전이 나오면 정상 설치</text>

  <rect x="640" y="140" width="440" height="220" rx="22" fill="#111827" stroke="#22c55e" stroke-width="2" />
  <text x="860" y="182" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">기본 설정</text>
  <rect x="690" y="215" width="340" height="100" rx="14" fill="#020617" stroke="#334155" stroke-width="1.5" />
  <text x="710" y="252" font-size="18" fill="#e5e7eb">git config --global user.name "내 이름"</text>
  <text x="710" y="284" font-size="18" fill="#e5e7eb">git config --global user.email "이메일"</text>
  <text x="860" y="344" text-anchor="middle" font-size="15" fill="#86efac">커밋 작성자 정보 등록</text>

  <rect x="220" y="420" width="760" height="58" rx="14" fill="#111827" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="456" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: 설치 직후에는 버전 확인과 user.name, user.email 설정까지만 해도 충분하다</text>
</svg>
