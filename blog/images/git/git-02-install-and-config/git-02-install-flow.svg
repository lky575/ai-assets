<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#0f172a" />
  <text x="600" y="52" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">Git 설치 후 기본 준비 흐름</text>
  <text x="600" y="84" text-anchor="middle" font-size="16" fill="#94a3b8">처음에는 설치, 확인, 사용자 설정까지만 잡으면 충분하다</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#60a5fa" />
    </marker>
  </defs>

  <rect x="80" y="150" width="220" height="120" rx="20" fill="#1e293b" stroke="#60a5fa" stroke-width="2" />
  <text x="190" y="192" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">1. Git 설치</text>
  <text x="190" y="225" text-anchor="middle" font-size="16" fill="#cbd5e1">공식 사이트 또는</text>
  <text x="190" y="250" text-anchor="middle" font-size="16" fill="#cbd5e1">패키지 매니저 사용</text>

  <rect x="380" y="150" width="220" height="120" rx="20" fill="#1e293b" stroke="#60a5fa" stroke-width="2" />
  <text x="490" y="192" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">2. 설치 확인</text>
  <text x="490" y="225" text-anchor="middle" font-size="16" fill="#cbd5e1">git --version</text>
  <text x="490" y="250" text-anchor="middle" font-size="16" fill="#cbd5e1">정상 인식 여부 확인</text>

  <rect x="680" y="150" width="220" height="120" rx="20" fill="#1e293b" stroke="#60a5fa" stroke-width="2" />
  <text x="790" y="192" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">3. 사용자 설정</text>
  <text x="790" y="225" text-anchor="middle" font-size="16" fill="#cbd5e1">user.name</text>
  <text x="790" y="250" text-anchor="middle" font-size="16" fill="#cbd5e1">user.email</text>

  <rect x="980" y="150" width="140" height="120" rx="20" fill="#1e293b" stroke="#34d399" stroke-width="2" />
  <text x="1050" y="192" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">완료</text>
  <text x="1050" y="225" text-anchor="middle" font-size="16" fill="#cbd5e1">이제 저장소</text>
  <text x="1050" y="250" text-anchor="middle" font-size="16" fill="#cbd5e1">실습 가능</text>

  <line x1="300" y1="210" x2="380" y2="210" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="600" y1="210" x2="680" y2="210" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="900" y1="210" x2="980" y2="210" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)" />

  <rect x="300" y="300" width="600" height="78" rx="14" fill="#111827" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="330" text-anchor="middle" font-size="18" font-weight="700" fill="#e5e7eb">핵심 명령</text>
  <text x="600" y="354" text-anchor="middle" font-size="16" fill="#e5e7eb">git --version / git config --global user.name</text>
  <text x="600" y="374" text-anchor="middle" font-size="16" fill="#e5e7eb">git config --global user.email</text>
</svg>
