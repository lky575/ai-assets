<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#0f172a" />
  <text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">협업 전 알아두면 좋은 Git 습관</text>
  <text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">작은 습관 몇 가지가 Git 기록을 더 읽기 쉽게 만들고 협업 실수도 줄여준다</text>
  <rect x="70" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" />
  <text x="195" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">자주 확인</text>
  <text x="195" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">status, diff</text>
  <text x="195" y="282" text-anchor="middle" font-size="16" fill="#86efac">작업 상태 점검</text>
  <rect x="355" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" />
  <text x="480" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">작게 커밋</text>
  <text x="480" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">의미 단위 분리</text>
  <text x="480" y="282" text-anchor="middle" font-size="16" fill="#93c5fd">읽기 쉬운 기록</text>
  <rect x="640" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" />
  <text x="765" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">브랜치 분리</text>
  <text x="765" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">main 보호</text>
  <text x="765" y="282" text-anchor="middle" font-size="16" fill="#fcd34d">작업 범위 분리</text>
  <rect x="925" y="160" width="205" height="220" rx="22" fill="#111827" stroke="#a78bfa" stroke-width="2" />
  <text x="1027" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">push 전 점검</text>
  <text x="1027" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">한 번 더 확인</text>
  <text x="1027" y="282" text-anchor="middle" font-size="16" fill="#c4b5fd">실수 감소</text>
  <line x1="320" y1="270" x2="337" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="320" cy="270" r="7" fill="#60a5fa" /><polygon points="355,270 337,261 337,279" fill="#60a5fa" />
  <line x1="605" y1="270" x2="622" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="605" cy="270" r="7" fill="#60a5fa" /><polygon points="640,270 622,261 622,279" fill="#60a5fa" />
  <line x1="890" y1="270" x2="907" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="890" cy="270" r="7" fill="#60a5fa" /><polygon points="925,270 907,261 907,279" fill="#60a5fa" />
  <rect x="125" y="450" width="950" height="78" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="483" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: 좋은 Git 사용 습관은 특별한 기술보다</text>
  <text x="600" y="510" text-anchor="middle" font-size="18" fill="#e5e7eb">작은 확인과 정리를 꾸준히 반복하는 데서 만들어진다</text>
</svg>
