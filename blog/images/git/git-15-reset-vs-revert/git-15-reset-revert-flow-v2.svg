<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580">
  <rect width="1200" height="580" fill="#0f172a" />
  <text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">git reset과 git revert 차이 요약</text>
  <text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">reset은 이전 위치로 되돌아가고, revert는 취소 커밋을 새로 추가한다고 이해하면 쉽다</text>
  <rect x="90" y="160" width="450" height="250" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" />
  <text x="315" y="204" text-anchor="middle" font-size="26" font-weight="700" fill="#f8fafc">git reset</text>
  <text x="315" y="244" text-anchor="middle" font-size="16" fill="#cbd5e1">기록 위치를 이전으로 옮김</text>
  <text x="315" y="284" text-anchor="middle" font-size="16" fill="#fcd34d">로컬 정리에서 자주 사용</text>
  <text x="315" y="316" text-anchor="middle" font-size="16" fill="#fcd34d">공유 기록에서는 주의 필요</text>
  <rect x="660" y="160" width="450" height="250" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" />
  <text x="885" y="204" text-anchor="middle" font-size="26" font-weight="700" fill="#f8fafc">git revert</text>
  <text x="885" y="244" text-anchor="middle" font-size="16" fill="#cbd5e1">취소 내용을 새 커밋으로 남김</text>
  <text x="885" y="284" text-anchor="middle" font-size="16" fill="#93c5fd">공유된 기록에서도 비교적 안전</text>
  <text x="885" y="316" text-anchor="middle" font-size="16" fill="#93c5fd">이력은 유지하고 되돌림</text>
  <line x1="540" y1="285" x2="624" y2="285" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" />
  <circle cx="540" cy="285" r="7" fill="#60a5fa" />
  <polygon points="642,285 624,276 624,294" fill="#60a5fa" />
  <rect x="150" y="455" width="900" height="82" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="489" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: reset은 기록 위치를 옮기는 쪽에 가깝고</text>
  <text x="600" y="517" text-anchor="middle" font-size="18" fill="#e5e7eb">revert는 취소 기록을 하나 더 남겨서 되돌리는 쪽에 가깝다</text>
</svg>
