<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#0f172a" />
  <text x="600" y="52" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">Git 첫 저장소와 첫 커밋 흐름</text>
  <text x="600" y="84" text-anchor="middle" font-size="16" fill="#94a3b8">저장소 생성부터 첫 기록까지의 가장 기본적인 순서</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#60a5fa" />
    </marker>
  </defs>

  <rect x="70" y="150" width="180" height="110" rx="18" fill="#1e293b" stroke="#60a5fa" stroke-width="2" />
  <text x="160" y="188" text-anchor="middle" font-size="21" font-weight="700" fill="#f8fafc">1. 폴더 준비</text>
  <text x="160" y="218" text-anchor="middle" font-size="15" fill="#cbd5e1">mkdir</text>
  <text x="160" y="242" text-anchor="middle" font-size="15" fill="#cbd5e1">cd 프로젝트폴더</text>

  <rect x="290" y="150" width="180" height="110" rx="18" fill="#1e293b" stroke="#60a5fa" stroke-width="2" />
  <text x="380" y="188" text-anchor="middle" font-size="21" font-weight="700" fill="#f8fafc">2. 저장소 생성</text>
  <text x="380" y="218" text-anchor="middle" font-size="15" fill="#cbd5e1">git init</text>
  <text x="380" y="242" text-anchor="middle" font-size="15" fill="#cbd5e1">Git 관리 시작</text>

  <rect x="510" y="150" width="180" height="110" rx="18" fill="#1e293b" stroke="#60a5fa" stroke-width="2" />
  <text x="600" y="188" text-anchor="middle" font-size="21" font-weight="700" fill="#f8fafc">3. 파일 추가</text>
  <text x="600" y="218" text-anchor="middle" font-size="15" fill="#cbd5e1">README.md 생성</text>
  <text x="600" y="242" text-anchor="middle" font-size="15" fill="#cbd5e1">상태 확인</text>

  <rect x="730" y="150" width="180" height="110" rx="18" fill="#1e293b" stroke="#60a5fa" stroke-width="2" />
  <text x="820" y="188" text-anchor="middle" font-size="21" font-weight="700" fill="#f8fafc">4. 스테이징</text>
  <text x="820" y="218" text-anchor="middle" font-size="15" fill="#cbd5e1">git add</text>
  <text x="820" y="242" text-anchor="middle" font-size="15" fill="#cbd5e1">커밋 후보 올리기</text>

  <rect x="950" y="150" width="180" height="110" rx="18" fill="#1e293b" stroke="#34d399" stroke-width="2" />
  <text x="1040" y="188" text-anchor="middle" font-size="21" font-weight="700" fill="#f8fafc">5. 첫 커밋</text>
  <text x="1040" y="218" text-anchor="middle" font-size="15" fill="#cbd5e1">git commit -m</text>
  <text x="1040" y="242" text-anchor="middle" font-size="15" fill="#cbd5e1">첫 기록 저장</text>

  <line x1="250" y1="205" x2="290" y2="205" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="470" y1="205" x2="510" y2="205" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="690" y1="205" x2="730" y2="205" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="910" y1="205" x2="950" y2="205" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)" />

  <rect x="240" y="304" width="720" height="60" rx="14" fill="#111827" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="341" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 흐름: git init → 파일 생성 → git status → git add → git commit -m</text>
</svg>
