<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#0f172a" />
  <text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">git diff 기본 흐름 요약</text>
  <text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">커밋 전에 무엇이 바뀌었는지 먼저 확인하면 실수를 줄이고 더 안전하게 기록할 수 있다</text>

  <rect x="70" y="160" width="320" height="240" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" />
  <text x="230" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">이전 상태</text>
  <text x="230" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">마지막 커밋 기준</text>
  <text x="230" y="282" text-anchor="middle" font-size="16" fill="#86efac">Git이 알고 있는 상태</text>
  <text x="230" y="314" text-anchor="middle" font-size="16" fill="#86efac">비교의 기준점</text>

  <rect x="440" y="160" width="320" height="240" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" />
  <text x="600" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">git diff</text>
  <text x="600" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">변경 내용 비교</text>
  <text x="600" y="282" text-anchor="middle" font-size="16" fill="#93c5fd">추가된 줄</text>
  <text x="600" y="314" text-anchor="middle" font-size="16" fill="#93c5fd">삭제된 줄</text>
  <text x="600" y="346" text-anchor="middle" font-size="16" fill="#93c5fd">수정된 부분</text>

  <rect x="810" y="160" width="320" height="240" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" />
  <text x="970" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">현재 작업 상태</text>
  <text x="970" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">아직 커밋 전</text>
  <text x="970" y="282" text-anchor="middle" font-size="16" fill="#fcd34d">무엇이 달라졌는지</text>
  <text x="970" y="314" text-anchor="middle" font-size="16" fill="#fcd34d">눈으로 먼저 검토</text>

  <line x1="390" y1="280" x2="414" y2="280" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" />
  <circle cx="390" cy="280" r="7" fill="#60a5fa" />
  <polygon points="432,280 414,271 414,289" fill="#60a5fa" />

  <line x1="760" y1="280" x2="784" y2="280" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" />
  <circle cx="760" cy="280" r="7" fill="#60a5fa" />
  <polygon points="802,280 784,271 784,289" fill="#60a5fa" />

  <rect x="110" y="450" width="980" height="78" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="483" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: git diff는 지금 바로 커밋하기 전에</text>
  <text x="600" y="510" text-anchor="middle" font-size="18" fill="#e5e7eb">무엇이 어떻게 바뀌었는지 확인하게 도와주는 가장 기본적인 검토 도구다</text>
</svg>
