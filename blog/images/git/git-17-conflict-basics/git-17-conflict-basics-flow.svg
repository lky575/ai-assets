<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#0f172a" />
  <text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#e5e7eb">Git conflict 해결 흐름 요약</text>
  <text x="600" y="90" text-anchor="middle" font-size="16" fill="#94a3b8">같은 부분을 다르게 수정하면 충돌이 생기고, 이때는 사람이 내용을 확인해 직접 정리해야 한다</text>
  <rect x="70" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" />
  <text x="195" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">브랜치 A</text>
  <text x="195" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">같은 파일 수정</text>
  <text x="195" y="282" text-anchor="middle" font-size="16" fill="#fcd34d">첫 번째 변경</text>
  <rect x="355" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#ef4444" stroke-width="2" />
  <text x="480" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">conflict</text>
  <text x="480" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">자동 판단 불가</text>
  <text x="480" y="282" text-anchor="middle" font-size="16" fill="#fca5a5">사용자 확인 필요</text>
  <rect x="640" y="160" width="250" height="220" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" />
  <text x="765" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">내용 확인</text>
  <text x="765" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">어느 내용을 남길지</text>
  <text x="765" y="282" text-anchor="middle" font-size="16" fill="#93c5fd">직접 정리</text>
  <rect x="925" y="160" width="205" height="220" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" />
  <text x="1027" y="204" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">정리 완료</text>
  <text x="1027" y="242" text-anchor="middle" font-size="16" fill="#cbd5e1">커밋으로 마무리</text>
  <text x="1027" y="282" text-anchor="middle" font-size="16" fill="#86efac">merge 계속 진행</text>
  <line x1="320" y1="270" x2="337" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="320" cy="270" r="7" fill="#60a5fa" /><polygon points="355,270 337,261 337,279" fill="#60a5fa" />
  <line x1="605" y1="270" x2="622" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="605" cy="270" r="7" fill="#60a5fa" /><polygon points="640,270 622,261 622,279" fill="#60a5fa" />
  <line x1="890" y1="270" x2="907" y2="270" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" /><circle cx="890" cy="270" r="7" fill="#60a5fa" /><polygon points="925,270 907,261 907,279" fill="#60a5fa" />
  <rect x="115" y="450" width="970" height="78" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="483" text-anchor="middle" font-size="18" fill="#e5e7eb">핵심 기억: conflict는 Git이 망가진 것이 아니라</text>
  <text x="600" y="510" text-anchor="middle" font-size="18" fill="#e5e7eb">자동 판단이 어려워서 사람이 어떤 내용을 남길지 정리해달라는 신호다</text>
</svg>
